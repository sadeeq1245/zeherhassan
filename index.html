<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeher Hassan | Geo-Politics & Deep-Tech</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #f3f4f6; scroll-behavior: smooth; }
        .glass-nav { background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .text-accent { color: #e63946; }
        .hover-card:hover { border-color: rgba(230, 57, 70, 0.5); background-color: #0f0f0f; }
        
        /* Fullscreen Menu Overlay */
        #mobile-menu { transition: opacity 0.3s ease, visibility 0.3s ease; }
        .menu-hidden { opacity: 0; visibility: hidden; }
        .menu-visible { opacity: 1; visibility: visible; }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Top Navigation -->
    <header class="fixed top-0 w-full z-50 glass-nav py-5 px-6 md:px-12 flex justify-between items-center">
        <!-- Left: Logo -->
        <a href="/" class="text-2xl font-black tracking-widest uppercase text-white">
            Zeher<span class="text-accent">Hassan</span>
        </a>
        
        <!-- Right: Universal Menu Button (PC & Mobile) -->
        <button id="menu-btn" class="text-white hover:text-accent transition duration-300">
            <i class="fa-solid fa-bars-staggered text-2xl"></i>
        </button>
    </header>

    <!-- Fullscreen Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 bg-black/95 z-40 flex flex-col justify-center items-center menu-hidden">
        <button id="close-menu-btn" class="absolute top-6 right-6 md:right-12 text-white hover:text-accent text-3xl">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <nav class="flex flex-col space-y-8 text-center text-2xl font-bold tracking-widest uppercase">
            <a href="/" class="hover:text-accent transition">Latest Dispatches</a>
            <a href="/about.html" class="hover:text-accent transition">About the Desk</a>
            <a href="/contact.html" class="hover:text-accent transition">Contact</a>
            <a href="/privacy-policy.html" class="text-lg text-gray-500 hover:text-white transition mt-8">Privacy Policy</a>
        </nav>
    </div>

    <!-- Main Content: Magazine Feed -->
    <main class="pt-32 pb-24 px-6 md:px-12 max-w-5xl mx-auto min-h-screen">
        <div class="mb-12 border-b border-white/10 pb-6">
            <h1 class="text-4xl md:text-5xl font-black uppercase tracking-tight mb-2">Intelligence <span class="text-accent">Feed</span></h1>
            <p class="text-gray-400 font-mono text-sm tracking-widest uppercase">Geo-Politics • Semi-Conductors • Deep-Tech</p>
        </div>

        <!-- Dynamic Articles will be injected here by JavaScript -->
        <div id="article-feed" class="flex flex-col gap-6">
            <div class="text-gray-500 italic"><i class="fa-solid fa-satellite-dish animate-pulse mr-2"></i> Fetching data cluster...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-white/10 bg-[#020202]">
        <div class="max-w-5xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-sm font-bold tracking-widest uppercase text-gray-400">
                &copy; 2026 ZEHER HASSAN. ALL RIGHTS RESERVED.
            </div>
            <div class="flex gap-6 text-sm font-medium text-gray-500 uppercase tracking-widest">
                <a href="/about.html" class="hover:text-white transition">About</a>
                <a href="/privacy-policy.html" class="hover:text-white transition">Privacy Policy</a>
                <a href="/contact.html" class="hover:text-white transition">Contact</a>
            </div>
        </div>
    </footer>

    <!-- JavaScript to handle Menu & Local JSON Fetch -->
    <script>
        // --- 1. Menu Toggle Logic ---
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        function toggleMenu() {
            mobileMenu.classList.toggle('menu-hidden');
            mobileMenu.classList.toggle('menu-visible');
        }

        menuBtn.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', toggleMenu);


        // --- 2. Local JSON Fetch Logic ---
        async function fetchMagazinePosts() {
            const feed = document.getElementById('article-feed');
            
            try {
                // Fetch the static posts.json file from your root directory
                const response = await fetch('/posts.json');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch articles database (posts.json).');
                }
                
                const articles = await response.json();
                feed.innerHTML = ''; // Clear loading text

                if (articles.length === 0) {
                    feed.innerHTML = '<div class="p-6 border border-dashed border-white/20 text-gray-500 rounded-lg">No intelligence reports published yet.</div>';
                    return;
                }

                // Loop through array and append to feed
                articles.forEach(post => {
                    const card = `
                        <a href="${post.url}" class="hover-card flex flex-col md:flex-row bg-[#0a0a0a] border border-white/5 rounded-lg overflow-hidden transition-all duration-300 group">
                            <!-- Thumbnail Banner -->
                            <div class="w-full md:w-1/3 h-48 md:h-auto bg-[#1a1a1a] relative overflow-hidden flex-shrink-0 flex items-center justify-center">
                                <i class="fa-solid fa-newspaper text-4xl text-gray-800 absolute z-0"></i>
                                <img src="${post.thumbnail}" alt="${post.title}" onerror="this.style.display='none'" class="object-cover w-full h-full relative z-10 opacity-70 group-hover:opacity-100 group-hover:scale-105 transition duration-500">
                            </div>
                            
                            <!-- Article Data -->
                            <div class="p-6 md:p-8 flex flex-col justify-center w-full">
                                <div class="flex items-center justify-between gap-4 mb-2">
                                    <span class="text-accent text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                                        <div class="w-1.5 h-1.5 rounded-full bg-accent"></div> Dispatch
                                    </span>
                                    <span class="text-gray-500 text-xs font-mono">${post.date}</span>
                                </div>
                                <h2 class="text-xl md:text-2xl font-bold text-white mb-3 leading-tight group-hover:text-accent transition">${post.title}</h2>
                                <p class="text-gray-400 text-sm leading-relaxed mb-4 line-clamp-2">${post.excerpt || ''}</p>
                                <span class="text-gray-500 text-xs font-bold uppercase tracking-widest flex items-center gap-2 mt-auto">
                                    Read Full Report <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition"></i>
                                </span>
                            </div>
                        </a>
                    `;
                    feed.innerHTML += card;
                });

            } catch (error) {
                console.error(error);
                feed.innerHTML = `<div class="p-6 border border-red-500/20 bg-red-500/5 text-red-400 rounded-lg">System Error: ${error.message}</div>`;
            }
        }

        // Trigger fetch on load
        fetchMagazinePosts();
    </script>
</body>
</html>
