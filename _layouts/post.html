---
layout: default
---

<main class="post-main">
    <article class="post-article">

        {% if page.thumbnail %}
        <div class="post-hero">
            <img src="{{ page.thumbnail }}" alt="{{ page.title }}" class="post-hero-img">
            <div class="post-hero-grad"></div>
        </div>
        {% endif %}

        <div class="post-container">

            <div class="post-meta-top">
                <div class="hero-cat">
                    <span class="hero-cat-dot"></span>
                    {{ page.category | default: "News" }}
                </div>
                <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
                    {{ page.date | date: "%B %d, %Y" }}
                </time>
            </div>

            <h1 class="post-title">{{ page.title }}</h1>

            {% if page.excerpt %}
            <p class="post-lead">{{ page.excerpt | strip_html }}</p>
            {% endif %}

            <div class="post-rule"></div>

            <div class="post-content">
                {{ content }}
            </div>

            <div class="post-back">
                <a href="{{ '/' | relative_url }}" class="post-back-link">
                    &larr; Back to Home
                </a>
                &nbsp;&nbsp;
                <a href="{{ '/articles.html' | relative_url }}" class="post-back-link">
                    All Articles &rarr;
                </a>
            </div>

        </div>
    </article>
</main>
