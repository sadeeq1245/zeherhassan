--- layout: default ---
<main>

    <div class="sec-hd">
        <span class="sec-title">Top <span>Stories</span></span>
    </div>

    <div class="hero-wrap" id="heroWrap">
        <div class="loading-msg">
            <i class="fa-solid fa-circle-notch spin" style="color:var(--red)"></i>
            Loading stories…
        </div>
    </div>

    <div class="sec-hd">
        <span class="sec-title">Latest <span>News</span></span>
        <div class="sec-line"></div>
        <a href="{{ '/articles.html' | relative_url }}" class="sec-link">See all &rarr;</a>
    </div>

    <div class="grid" id="articleGrid"></div>

    <div class="sec-hd" style="margin-top:8px;">
        <span class="sec-title">Browse <span>Topics</span></span>
        <div class="sec-line"></div>
    </div>

    <div class="topics">
        <a href="#" class="topic">
            <div class="topic-icon">🌍</div>
            <div class="topic-name">Geo-Politics</div>
            <div class="topic-sub">World Affairs</div>
        </a>
        <a href="#" class="topic">
            <div class="topic-icon">💾</div>
            <div class="topic-name">Semiconductors</div>
            <div class="topic-sub">Chip Wars</div>
        </a>
        <a href="#" class="topic">
            <div class="topic-icon">🤖</div>
            <div class="topic-name">Deep-Tech</div>
            <div class="topic-sub">AI &amp; Beyond</div>
        </a>
        <a href="#" class="topic">
            <div class="topic-icon">⚡</div>
            <div class="topic-name">Analysis</div>
            <div class="topic-sub">In-Depth Reports</div>
        </a>
    </div>

</main>
